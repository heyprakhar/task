version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: taskk-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Harshiv#1134
      MYSQL_DATABASE: taskflow_db

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: